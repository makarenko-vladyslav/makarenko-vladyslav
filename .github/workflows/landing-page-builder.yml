name: Build Contiguous SVG Landing Page

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours
  workflow_dispatch: # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Run Builder Script
        run: node scripts/build-landing.js

      - name: Commit and Push Compiled SVGs
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/compiled-*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-compile live SVGs into black wrappers"
            git push
          fi
