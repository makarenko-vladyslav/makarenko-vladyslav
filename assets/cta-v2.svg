<svg width="100%" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=Inter:wght@400;500&amp;display=swap');
      .bg { fill: #000000; }
      
      .title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 48px; font-weight: 700; fill: #ffffff; letter-spacing: -1px; }
      .subtitle { font-family: 'Inter', system-ui, sans-serif; font-size: 18px; font-weight: 400; fill: #888888; }
      
      .btn-bg { fill: #E3FF00; transition: all 0.3s ease; }
      .btn-text { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #000000; letter-spacing: 1px; }
      
      .glow-layer {
        fill: #E3FF00;
        filter: drop-shadow(0 0 20px rgba(227, 255, 0, 0.4));
        opacity: 0.15;
      }

      .animated { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
      .d-1 { animation-delay: 0.2s; }
      .d-2 { animation-delay: 0.4s; }
      .d-3 { animation-delay: 0.6s; }
      
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .pulse { animation: pulse 2s infinite; }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.15; }
        50% { transform: scale(1.05); opacity: 0.25; }
        100% { transform: scale(1); opacity: 0.15; }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g transform="translate(600, 140)">
    <g class="animated d-1">
      <text x="0" y="0" class="title" text-anchor="middle">Ready to scale your digital presence?</text>
    </g>
    <g class="animated d-2">
      <text x="0" y="40" class="subtitle" text-anchor="middle">Let's craft an experience that sets your brand apart.</text>
    </g>


  </g>
</svg>
