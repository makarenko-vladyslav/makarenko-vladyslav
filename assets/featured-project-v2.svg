<svg width="100%" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap');
      .bg { fill: #000000; }
      .title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 32px; font-weight: 700; fill: #ffffff; }
      .desc { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 400; fill: #888888; line-height: 1.6; }
      
      .tag-bg { fill: rgba(227, 255, 0, 0.05); stroke: rgba(227, 255, 0, 0.2); stroke-width: 1; }
      .tag-text { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 12px; font-weight: 700; fill: #E3FF00; letter-spacing: 1px;}
      
      .link { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 600; fill: #ffffff; }
      .link-arrow { fill: none; stroke: #E3FF00; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      
      .mockup-bg { fill: #0a0a0a; stroke: #222222; stroke-width: 1; }
      .mockup-dot-r { fill: #ff5f56; }
      .mockup-dot-y { fill: #ffbd2e; }
      .mockup-dot-g { fill: #27c93f; }
      
      .section-label { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #E3FF00; letter-spacing: 4px; text-transform: uppercase; }

      .grid-line { stroke: rgba(227, 255, 0, 0.05); stroke-width: 1; }

      .animated { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
      .d-1 { animation-delay: 0.1s; }
      .d-2 { animation-delay: 0.3s; }
      .d-3 { animation-delay: 0.5s; }
      
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      /* Wireframe animations inside mockup */
      .draw-line {
        stroke: #E3FF00;
        stroke-width: 2;
        fill: none;
        stroke-dasharray: 1000;
        stroke-dashoffset: 1000;
        animation: draw 4s ease-in-out infinite alternate;
        opacity: 0.5;
      }
      
      @keyframes draw {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
    
    <pattern id="mockupGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" class="grid-line" />
    </pattern>

    <radialGradient id="mockupGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3FF00" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- Section Label -->
  <g transform="translate(100, 60)">
    <g class="animated d-1">
      <rect x="-10" y="-10" width="4" height="14" fill="#E3FF00" rx="2" />
      <text x="0" y="0" class="section-label">FEATURED WORK</text>
    </g>
  </g>

  <!-- Left Side: Mockup Window -->
  <g transform="translate(100, 100)">
    <g class="animated d-2">
      <rect width="600" height="340" rx="12" class="mockup-bg" />
      <rect width="600" height="340" rx="12" fill="url(#mockupGrid)" />
      <rect width="600" height="340" fill="url(#mockupGlow)" />
      
      <!-- MacOS Window Dots -->
      <circle cx="20" cy="20" r="6" class="mockup-dot-r" />
      <circle cx="40" cy="20" r="6" class="mockup-dot-y" />
      <circle cx="60" cy="20" r="6" class="mockup-dot-g" />
      <line x1="0" y1="40" x2="600" y2="40" stroke="#222222" stroke-width="1" />
      
      <!-- Advanced Stats Chart Dashboard UI -->
      <g transform="translate(40, 60)">
         <!-- Chart Container -->
         <rect x="0" y="0" width="520" height="250" rx="8" fill="#0a0a0a" stroke="#222" stroke-width="1"/>
         
         <!-- Header / Metrics -->
         <text x="30" y="40" font-family="'Space Grotesk', system-ui, sans-serif" font-size="24px" font-weight="700" fill="#fff">$124,500</text>
         <text x="30" y="60" font-family="'Inter', system-ui, sans-serif" font-size="12px" fill="#888">Monthly Recurring Revenue</text>
         <rect x="145" y="22" width="50" height="20" rx="10" fill="rgba(39, 201, 63, 0.1)" />
         <text x="170" y="36" font-family="'Inter', system-ui, sans-serif" font-size="12px" font-weight="600" fill="#27c93f" text-anchor="middle">+14%</text>
         
         <!-- Grid and Axes -->
         <g stroke="#222" stroke-width="1" stroke-dasharray="4 4">
            <line x1="30" y1="90" x2="490" y2="90" />
            <line x1="30" y1="140" x2="490" y2="140" />
            <line x1="30" y1="190" x2="490" y2="190" />
         </g>
         <!-- Y-axis labels -->
         <g font-family="'Inter', system-ui, sans-serif" font-size="10px" fill="#666">
            <text x="30" y="85">$150k</text>
            <text x="30" y="135">$100k</text>
            <text x="30" y="185">$50k</text>
         </g>
         <!-- X-axis labels -->
         <g font-family="'Inter', system-ui, sans-serif" font-size="10px" fill="#666" text-anchor="middle">
            <text x="80" y="210">Jan</text>
            <text x="160" y="210">Feb</text>
            <text x="240" y="210">Mar</text>
            <text x="320" y="210">Apr</text>
            <text x="400" y="210">May</text>
            <text x="480" y="210">Jun</text>
         </g>

         <!-- The Line Chart -->
         <defs>
           <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
             <stop offset="0%" stop-color="#E3FF00" stop-opacity="0.15" />
             <stop offset="100%" stop-color="#E3FF00" stop-opacity="0" />
           </linearGradient>
           <filter id="glowChart">
             <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
             <feMerge>
               <feMergeNode in="coloredBlur"/>
               <feMergeNode in="SourceGraphic"/>
             </feMerge>
           </filter>
         </defs>

         <!-- Area Fill -->
         <path d="M 80,180 C 160,180 180,110 240,130 S 300,160 320,150 S 380,80 400,90 S 460,110 480,70 L 480,190 L 80,190 Z" fill="url(#chartGradient)" />
         
         <!-- Animated Draw Line -->
         <path d="M 80,180 C 160,180 180,110 240,130 S 300,160 320,150 S 380,80 400,90 S 460,110 480,70" class="draw-line" filter="url(#glowChart)" />
         
         <!-- Data point at the end -->
         <circle cx="480" cy="70" r="4" fill="#0a0a0a" stroke="#E3FF00" stroke-width="2" />
         <!-- Pulsing ring -->
         <circle cx="480" cy="70" r="10" fill="none" stroke="#E3FF00" stroke-width="1" opacity="0.5">
           <animate attributeName="r" values="4;15" dur="2s" repeatCount="indefinite" />
           <animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite" />
         </circle>
         <!-- Tooltip -->
         <rect x="420" y="30" width="70" height="24" rx="4" fill="#E3FF00" />
         <polygon points="450,54 460,54 455,58" fill="#E3FF00" />
         <text x="455" y="46" font-family="'Space Grotesk', system-ui, sans-serif" font-size="12px" font-weight="700" fill="#000" text-anchor="middle">$124.5k</text>
      </g>
    </g>
  </g>

  <!-- Right Side: Content -->
  <g transform="translate(760, 160)">
    <g class="animated d-3">
      <text x="0" y="0" class="title">Next-Gen SaaS Architecture</text>
      
      <text x="0" y="40" class="desc">Architected and engineered a premium, highly</text>
      <text x="0" y="65" class="desc">scalable platform from the ground up. Features</text>
      <text x="0" y="90" class="desc">unified design systems, fluid 60fps micro-actions,</text>
      <text x="0" y="115" class="desc">robust Server Actions, and a scalable backend.</text>

      <!-- Tags -->
      <g transform="translate(0, 150)">
        <!-- Row 1 -->
        <rect x="0" y="0" width="75" height="28" rx="14" class="tag-bg" />
        <text x="37" y="18" class="tag-text" text-anchor="middle">NEXT.JS</text>

        <rect x="85" y="0" width="90" height="28" rx="14" class="tag-bg" />
        <text x="130" y="18" class="tag-text" text-anchor="middle">TAILWIND</text>

        <rect x="185" y="0" width="75" height="28" rx="14" class="tag-bg" />
        <text x="222" y="18" class="tag-text" text-anchor="middle">PRISMA</text>
        
        <!-- Row 2 -->
        <rect x="0" y="38" width="105" height="28" rx="14" class="tag-bg" />
        <text x="52" y="56" class="tag-text" text-anchor="middle">TYPESCRIPT</text>

        <rect x="115" y="38" width="95" height="28" rx="14" class="tag-bg" />
        <text x="162" y="56" class="tag-text" text-anchor="middle">SUPABASE</text>

        <rect x="220" y="38" width="80" height="28" rx="14" class="tag-bg" />
        <text x="260" y="56" class="tag-text" text-anchor="middle">ZUSTAND</text>

        <!-- Row 3 -->
        <rect x="0" y="76" width="90" height="28" rx="14" class="tag-bg" />
        <text x="45" y="94" class="tag-text" text-anchor="middle">POSTHOG</text>

        <rect x="100" y="76" width="75" height="28" rx="14" class="tag-bg" />
        <text x="137" y="94" class="tag-text" text-anchor="middle">STRIPE</text>

        <rect x="185" y="76" width="85" height="28" rx="14" class="tag-bg" />
        <text x="227" y="94" class="tag-text" text-anchor="middle">FRAMER</text>
      </g>
    </g>
  </g>

</svg>
