<svg width="100%" viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Inter:wght@300;400;500&amp;display=swap');
      
      * { box-sizing: border-box; }
      .bg { fill: #000000; }
      
      .shape-1 {
        fill: none;
        stroke: url(#grad1);
        stroke-width: 1.5;
        opacity: 0.3;
        animation: rotateSlow 40s linear infinite;
        transform-origin: center;
      }
      
      .shape-2 {
        fill: none;
        stroke: url(#grad2);
        stroke-width: 0.5;
        opacity: 0.2;
        animation: rotateSlowReverse 50s linear infinite;
        transform-origin: center;
        stroke-dasharray: 4 12;
      }

      .title {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 85px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: -3px;
        text-anchor: middle;
      }
      
      .subtitle {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 20px;
        font-weight: 400;
        fill: #888888;
        letter-spacing: 5px;
        text-anchor: middle;
        text-transform: uppercase;
      }

      .accent { fill: #E3FF00; }

      @keyframes rotateSlow { 100% { transform: rotate(360deg); } }
      @keyframes rotateSlowReverse { 100% { transform: rotate(-360deg); } }
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
      }
      @keyframes fadeIn {
        0% { opacity: 0; transform: translateY(15px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .animate-float { animation: float 6s ease-in-out infinite; }
      .fade-in-1 { animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; opacity: 0; }
      .fade-in-2 { animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.3s; opacity: 0; }
      .fade-in-3 { animation: fadeIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.6s; opacity: 0; }
    </style>

    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3FF00"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3FF00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#centerGlow)" />

  <g transform="translate(600, 300)">
    <g class="animate-float">
      <circle cx="0" cy="0" r="160" class="shape-2" />
      <g class="shape-1">
        <ellipse cx="0" cy="0" rx="140" ry="50" transform="rotate(30)" />
        <ellipse cx="0" cy="0" rx="140" ry="50" transform="rotate(-30)" />
        <ellipse cx="0" cy="0" rx="140" ry="50" transform="rotate(90)" />
      </g>
    </g>
  </g>

  <g transform="translate(600, 310)">
    <!-- Badge positioned securely without overriding CSS transforms -->
    <g transform="translate(0, -100)">
      <g class="fade-in-1">
        <rect x="-85" y="-15" width="170" height="30" rx="15" fill="#111111" stroke="#333333" stroke-width="1" />
        <circle cx="-65" cy="0" r="4" fill="#E3FF00">
          <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
        </circle>
        <text x="-50" y="4" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#aaaaaa" letter-spacing="1.5px" text-anchor="start">AVAILABLE FOR WORK</text>
      </g>
    </g>

    <!-- Title -->
    <g transform="translate(0, 5)">
      <g class="fade-in-2">
         <text x="0" y="0" class="title">VLADYSLAV MAKARENKO</text>
      </g>
    </g>
    
    <!-- Subtitle -->
    <g transform="translate(0, 55)">
      <g class="fade-in-3">
        <text x="0" y="0" class="subtitle">CREATIVE DEVELOPER <tspan fill="#E3FF00">✦</tspan> ARCHITECT</text>
      </g>
    </g>
  </g>
</svg>