<svg width="100%" viewBox="0 0 1200 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .bg { fill: #000000; }
      .card-bg { fill: url(#card-grad); stroke: rgba(227, 255, 0, 0.15); stroke-width: 1; }
      .card-title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 24px; font-weight: 700; fill: #ffffff; }
      .card-text { font-family: 'Inter', system-ui, sans-serif; font-size: 15px; font-weight: 400; fill: #888888; line-height: 1.6; }
      .accent { fill: #E3FF00; }
      .icon-bg { fill: #E3FF00; opacity: 0.1; }
      .section-title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #E3FF00; letter-spacing: 4px; text-transform: uppercase; }
      
      .animated { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
      .d-1 { animation-delay: 0.1s; }
      .d-2 { animation-delay: 0.3s; }
      .d-3 { animation-delay: 0.5s; }
      .d-4 { animation-delay: 0.7s; }

      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .float { animation: float-anim 6s ease-in-out infinite; }
      .float-d1 { animation-delay: -2s; }
      .float-d2 { animation-delay: -4s; }

      @keyframes float-anim {
        0% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
        100% { transform: translateY(0); }
      }

      .grid-line { stroke: rgba(255, 255, 255, 0.03); stroke-width: 1; }
    </style>

    <linearGradient id="card-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid-line" />
    </pattern>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3FF00" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <rect width="100%" height="100%" fill="url(#glow)" />

  <g transform="translate(60, 50)">
    <g class="animated d-1">
      <rect x="-10" y="-12" width="4" height="16" fill="#E3FF00" rx="2" />
      <text x="0" y="0" class="section-title">CORE EXPERTISE</text>
    </g>
  </g>

  <!-- UX/UI Design -->
  <g transform="translate(60, 100)">
    <g class="animated d-2">
      <g class="float float-d1">
        <rect width="340" height="280" rx="16" class="card-bg" />
        <g transform="translate(30, 40)">
          <rect x="0" y="0" width="48" height="48" rx="12" class="icon-bg" />
          <path d="M14,24 L34,24 M24,14 L24,34" stroke="#E3FF00" stroke-width="2.5" stroke-linecap="round"/>
          <text x="0" y="95" class="card-title">UX/UI Mastery</text>
          <text x="0" y="140" class="card-text">Design systems, Figma</text>
          <text x="0" y="165" class="card-text">prototyping, micro-interactions,</text>
          <text x="0" y="190" class="card-text">and pixel-perfect execution</text>
          <text x="0" y="215" class="card-text">tailored for 0.01% aesthetics.</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Frontend -->
  <g transform="translate(430, 100)">
    <g class="animated d-3">
      <g class="float float-d2">
        <rect width="340" height="280" rx="16" class="card-bg" />
        <g transform="translate(30, 40)">
          <rect x="0" y="0" width="48" height="48" rx="12" class="icon-bg" />
          <path d="M14,19 L34,19 M14,29 L24,29" stroke="#E3FF00" stroke-width="2.5" stroke-linecap="round"/>
          <text x="0" y="95" class="card-title">Frontend Magic</text>
          <text x="0" y="140" class="card-text">Next.js 16, React, TailwindCSS.</text>
          <text x="0" y="165" class="card-text">Framer Motion, WebGL 3D</text>
          <text x="0" y="190" class="card-text">experiences, Server Actions,</text>
          <text x="0" y="215" class="card-text">60fps performance optimization.</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Backend Architecture -->
  <g transform="translate(800, 100)">
    <g class="animated d-4">
      <g class="float">
        <rect width="340" height="280" rx="16" class="card-bg" />
        <g transform="translate(30, 40)">
          <rect x="0" y="0" width="48" height="48" rx="12" class="icon-bg" />
          <path d="M18,14 L30,14 A6,6 0 0,1 36,20 L36,28 A6,6 0 0,1 30,34 L18,34 A6,6 0 0,1 12,28 L12,20 A6,6 0 0,1 18,14" stroke="#E3FF00" stroke-width="2.5" fill="none"/>
          <text x="0" y="95" class="card-title">Backend &amp; Cloud</text>
          <text x="0" y="140" class="card-text">PostgreSQL, Prisma ORM,</text>
          <text x="0" y="165" class="card-text">Supabase, Node.js APIs.</text>
          <text x="0" y="190" class="card-text">Secure authentication &amp; scalable</text>
          <text x="0" y="215" class="card-text">infrastructures on Vercel.</text>
        </g>
      </g>
    </g>
  </g>
</svg>