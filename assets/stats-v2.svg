<svg width="100%" viewBox="0 0 1200 250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .bg { fill: #000000; }
      .stat-num { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 80px; font-weight: 700; fill: #ffffff; letter-spacing: -2px; }
      .stat-label { font-family: 'Inter', system-ui, sans-serif; font-size: 16px; font-weight: 500; fill: #888888; text-transform: uppercase; letter-spacing: 2px;}
      .accent { fill: #E3FF00; }
      
      .animated { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
      .d-1 { animation-delay: 0.2s; }
      .d-2 { animation-delay: 0.4s; }
      .d-3 { animation-delay: 0.6s; }
      
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }

      .glow-text {
        filter: drop-shadow(0 0 15px rgba(227, 255, 0, 0.4));
      }
      
      .line {
        stroke: rgba(255, 255, 255, 0.1);
        stroke-width: 1;
      }
    </style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3FF00" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#glow)" />

  <!-- Separator lines -->
  <line x1="400" y1="80" x2="400" y2="170" class="line" />
  <line x1="800" y1="80" x2="800" y2="170" class="line" />

  <!-- Stat 1 -->
  <g transform="translate(200, 130)">
    <g class="animated d-1">
      <text x="0" y="0" class="stat-num" text-anchor="middle">8<tspan class="accent glow-text">+</tspan></text>
      <text x="0" y="40" class="stat-label" text-anchor="middle">Years Experience</text>
    </g>
  </g>

  <!-- Stat 2 -->
  <g transform="translate(600, 130)">
    <g class="animated d-2">
      <text x="0" y="0" class="stat-num" text-anchor="middle">50<tspan class="accent glow-text">+</tspan></text>
      <text x="0" y="40" class="stat-label" text-anchor="middle">Projects Delivered</text>
    </g>
  </g>

  <!-- Stat 3 -->
  <g transform="translate(1000, 130)">
    <g class="animated d-3">
      <text x="0" y="0" class="stat-num" text-anchor="middle">100<tspan class="accent glow-text">%</tspan></text>
      <text x="0" y="40" class="stat-label" text-anchor="middle">Client Satisfaction</text>
    </g>
  </g>

</svg>
