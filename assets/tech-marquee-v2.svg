<svg width="100%" height="150" viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
      
      .bg { fill: #000000; }
      
      .marquee-container {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 40px;
        font-weight: 700;
        fill: #E3FF00;
        letter-spacing: 2px;
      }
      
      .marquee-text {
        animation: scroll 25s linear infinite;
        white-space: nowrap;
      }
      
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      
      .track {
        fill: none;
        stroke: #111111;
        stroke-width: 2;
      }
      
      .glow {
        filter: drop-shadow(0 0 15px rgba(227, 255, 0, 0.4));
      }
      
      /* Fading edges */
      .fade-left { fill: url(#fadeLeft); }
      .fade-right { fill: url(#fadeRight); }
    </style>
    
    <linearGradient id="fadeLeft" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="1" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="fadeRight" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </linearGradient>
    
    <pattern id="dotGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#111111" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <!-- Track Borders -->
  <line x1="0" y1="20" x2="100%" y2="20" class="track"/>
  <line x1="0" y1="130" x2="100%" y2="130" class="track"/>
  
  <!-- Subtle glowing center back -->
  <ellipse cx="600" cy="75" rx="300" ry="75" fill="#E3FF00" opacity="0.03" />

  <!-- Marquee Container -->
  <g class="marquee-container glow" transform="translate(0, 92)">
    <!-- Seamless infinite scrolling text duplicated twice -->
    <text x="0" y="0" class="marquee-text">
        NEXT.JS 16 ✦ TYPESCRIPT ✦ REACT ✦ TAILWIND ✦ PRISMA ✦ POSTGRES ✦ NODE.JS ✦ VUE.JS ✦ PYTHON ✦ DOCKER ✦ AWS ✦ WEBGL ✦ FRAMER ✦ NEXT.JS 16 ✦ TYPESCRIPT ✦ REACT ✦ TAILWIND ✦ PRISMA ✦ POSTGRES ✦ NODE.JS ✦ VUE.JS ✦ PYTHON ✦ DOCKER ✦ AWS ✦ WEBGL ✦ FRAMER ✦ 
    </text>
  </g>
  
  <rect x="0" y="0" width="150" height="150" class="fade-left" />
  <rect x="1050" y="0" width="150" height="150" class="fade-right" />
</svg>
