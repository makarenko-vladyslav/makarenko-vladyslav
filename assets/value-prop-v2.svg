<svg width="100%" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .bg { fill: #000000; }
      
      .title {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 16px;
        font-weight: 700;
        fill: #E3FF00;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      
      .highlight {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 42px;
        font-weight: 700;
        fill: #ffffff;
        letter-spacing: -1px;
      }
      
      .text {
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 18px;
        font-weight: 400;
        fill: #999999;
        line-height: 1.8;
      }

      .accent { fill: #ffffff; font-weight: 600; }
      
      .decorator {
        fill: none;
        stroke: url(#glowGradient);
        stroke-width: 2.5;
        stroke-linecap: round;
        animation: pulseLine 3s ease-in-out infinite;
      }
      
      .grid-bg { stroke: rgba(255, 255, 255, 0.03); stroke-width: 1; fill: none; }
      
      .animated { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
      .d-1 { animation-delay: 0.1s; }
      .d-2 { animation-delay: 0.3s; }
      .d-3 { animation-delay: 0.5s; }

      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes pulseLine {
        0%, 100% { filter: drop-shadow(0 0 2px #e3ff00); }
        50% { filter: drop-shadow(0 0 8px #e3ff00); }
      }
    </style>

    <pattern id="gridLarge" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" class="grid-bg" />
    </pattern>
    <linearGradient id="fadeBottom" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0" />
      <stop offset="100%" stop-color="#000000" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="glowGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E3FF00" />
      <stop offset="100%" stop-color="#222222" />
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E3FF00" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#gridLarge)" />
  <rect x="0" y="200" width="100%" height="200" fill="url(#fadeBottom)" />
  
  <!-- Massive Background Glow near the text -->
  <circle cx="200" cy="200" r="400" fill="url(#centerGlow)" />

  <g transform="translate(150, 80)">
    <g class="animated d-1">
      <rect x="-10" y="-12" width="4" height="16" fill="#E3FF00" rx="2" />
      <text x="0" y="0" class="title">VALUE PROPOSITION</text>
    </g>
    
    <g transform="translate(0, 75)">
      <g class="animated d-2">
        <text x="0" y="0" class="highlight">Transforming complex concepts into</text>
        <text x="0" y="55" class="highlight">seamless, high-converting digital products.</text>
      </g>
    </g>
    
    <g transform="translate(0, 175)">
      <g class="animated d-3">
        <text x="0" y="0" class="text">I am a hybrid <tspan class="accent">Senior Web Designer &amp; Full-Stack Architect</tspan> with a relentless focus on premium</text>
        <text x="0" y="32" class="text">aesthetics, 60fps animations, and scalable architecture. From pixel-perfect UX/UI to Server Actions</text>
        <text x="0" y="64" class="text">and secure PostgreSQL, I design experiences that drive measurable business growth and conversion.</text>
      </g>
    </g>
  </g>
</svg>