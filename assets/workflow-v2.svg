<svg width="100%" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;family=Inter:wght@400;500;600&amp;display=swap');
      
      .bg { fill: #000000; }
      
      .section-label { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 14px; font-weight: 700; fill: #E3FF00; letter-spacing: 4px; text-transform: uppercase; }
      
      .step-num { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 48px; font-weight: 700; fill: #111111; stroke: #333333; stroke-width: 1; }
      .step-title { font-family: 'Space Grotesk', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #ffffff; letter-spacing: 1px; }
      .step-desc { font-family: 'Inter', system-ui, sans-serif; font-size: 14px; font-weight: 400; fill: #888888; line-height: 1.6; }
      
      .line { stroke: rgba(227, 255, 0, 0.1); stroke-width: 2; fill: none; }
      .line-glow { stroke: #E3FF00; stroke-width: 2; fill: none; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawLine 3s ease-in-out infinite alternate; }
      
      .node-outer { fill: #000; stroke: #333; stroke-width: 2; transition: all 0.3s ease; }
      .node-inner { fill: #E3FF00; animation: pulse 2s infinite; }
      
      @keyframes drawLine {
        0% { stroke-dashoffset: 1000; }
        100% { stroke-dashoffset: 0; }
      }
      
      @keyframes pulse {
        0% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.2); opacity: 1; filter: drop-shadow(0 0 5px #e3ff00); }
        100% { transform: scale(0.8); opacity: 0.5; }
      }
      
      .animated { opacity: 0; animation: fadeInUp 0.8s ease-out forwards; }
      .d-1 { animation-delay: 0.1s; }
      .d-2 { animation-delay: 0.3s; }
      .d-3 { animation-delay: 0.5s; }
      .d-4 { animation-delay: 0.7s; }
      
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <!-- Section Label -->
  <g transform="translate(100, 60)">
    <g class="animated d-1">
      <rect x="-10" y="-10" width="4" height="14" fill="#E3FF00" rx="2" />
      <text x="0" y="0" class="section-label">HOW I WORK</text>
    </g>
  </g>

  <g transform="translate(150, 200)">
    <!-- Base Line -->
    <line x1="0" y1="0" x2="900" y2="0" class="line" />
    
    <!-- Animated SVG Path Line -->
    <path d="M 0,0 L 900,0" class="line-glow" />

  <!-- Step 1: Discovery -->
    <g transform="translate(0, 0)">
      <g class="animated d-1">
        <!-- Node -->
        <circle cx="0" cy="0" r="10" class="node-outer" />
        <circle cx="0" cy="0" r="4" class="node-inner" />
        
        <!-- Content Top -->
        <text x="0" y="-30" class="step-num" text-anchor="middle">01</text>
        
        <!-- Content Bottom -->
        <text x="0" y="40" class="step-title" text-anchor="middle">DISCOVERY</text>
        <text x="0" y="65" class="step-desc" text-anchor="middle">Deep dive into goals,</text>
        <text x="0" y="85" class="step-desc" text-anchor="middle">audience, and scope.</text>
      </g>
    </g>

    <!-- Step 2: Architecture -->
    <g transform="translate(300, 0)">
      <g class="animated d-2">
        <!-- Node -->
        <circle cx="0" cy="0" r="10" class="node-outer" />
        <circle cx="0" cy="0" r="4" class="node-inner" />
        
        <!-- Content Top -->
        <text x="0" y="-30" class="step-num" text-anchor="middle">02</text>
        
        <!-- Content Bottom -->
        <text x="0" y="40" class="step-title" text-anchor="middle">ARCHITECTURE</text>
        <text x="0" y="65" class="step-desc" text-anchor="middle">System design and tech</text>
        <text x="0" y="85" class="step-desc" text-anchor="middle">stack selection.</text>
      </g>
    </g>

    <!-- Step 3: Development -->
    <g transform="translate(600, 0)">
      <g class="animated d-3">
        <!-- Node -->
        <circle cx="0" cy="0" r="10" class="node-outer" />
        <circle cx="0" cy="0" r="4" class="node-inner" />
        
        <!-- Content Top -->
        <text x="0" y="-30" class="step-num" text-anchor="middle">03</text>
        
        <!-- Content Bottom -->
        <text x="0" y="40" class="step-title" text-anchor="middle">DEVELOPMENT</text>
        <text x="0" y="65" class="step-desc" text-anchor="middle">Agile execution with</text>
        <text x="0" y="85" class="step-desc" text-anchor="middle">clean, modular code.</text>
      </g>
    </g>

    <!-- Step 4: Scale -->
    <g transform="translate(900, 0)">
      <g class="animated d-4">
        <!-- Node -->
        <circle cx="0" cy="0" r="10" class="node-outer" />
        <circle cx="0" cy="0" r="4" class="node-inner" />
        
        <!-- Content Top -->
        <text x="0" y="-30" class="step-num" text-anchor="middle">04</text>
        
        <!-- Content Bottom -->
        <text x="0" y="40" class="step-title" text-anchor="middle">LAUNCH</text>
        <text x="0" y="65" class="step-desc" text-anchor="middle">Deployment, CI/CD,</text>
        <text x="0" y="85" class="step-desc" text-anchor="middle">&amp; performance scaling.</text>
      </g>
    </g>
  </g>
</svg>
