<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium SVG Preview</title>
    <style>
      body {
        background: #000;
        color: #fff;
        font-family: sans-serif;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 60px;
      }
      .container {
        width: 100%;
        max-width: 1200px;
        border: 1px solid #222;
      }
      h2 {
        text-align: center;
        color: #888;
        font-weight: normal;
        font-size: 16px;
        letter-spacing: 2px;
      }
      img {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
  <body>
    <div>
      <h2>HERO</h2>
      <div class="container">
        <img src="assets/hero-v2.svg?nocache=9" alt="Hero" />
      </div>
    </div>

    <div>
      <h2>STATS (Authority)</h2>
      <div class="container">
        <img src="assets/stats-v2.svg?nocache=9" alt="Stats" />
      </div>
    </div>

    <div>
      <h2>VALUE PROPOSITION</h2>
      <div class="container">
        <img src="assets/value-prop-v2.svg?nocache=9" alt="Value Prop" />
      </div>
    </div>

    <div>
      <h2>SERVICE CARDS</h2>
      <div class="container">
        <img src="assets/service-cards-v2.svg?nocache=9" alt="Services" />
      </div>
    </div>

    <div>
      <h2>TECH MARQUEE</h2>
      <div class="container">
        <img src="assets/tech-marquee-v2.svg?nocache=9" alt="Tech" />
      </div>
    </div>

    <div>
      <h2>FEATURED PROJECT</h2>
      <div class="container">
        <img
          src="assets/featured-project-v2.svg?nocache=9"
          alt="Featured Project"
        />
      </div>
    </div>

    <div>
      <h2>TIMELINE</h2>
      <div class="container">
        <img src="assets/timeline-v2.svg?nocache=9" alt="Timeline" />
      </div>
    </div>

    <div>
      <h2>HOW I WORK (Workflow)</h2>
      <div class="container">
        <img src="assets/workflow-v2.svg?nocache=9" alt="Workflow" />
      </div>
    </div>

    <div>
      <h2>CLIENT IMPACT (Testimonials)</h2>
      <div class="container">
        <img src="assets/testimonials-v2.svg?nocache=9" alt="Testimonials" />
      </div>
    </div>

    <div>
      <h2>LIVE DATA (GitHub Stats)</h2>
      <div class="container">
        <img
          src="assets/compiled-architecture.svg?nocache=9"
          alt="Live Data Architecture"
        />
      </div>
      <div style="height: 20px"></div>
      <div class="container">
        <img src="assets/compiled-activity.svg?nocache=9" alt="Activity Wave" />
      </div>
      <div style="height: 20px"></div>
      <div class="container">
        <img />
      </div>
    </div>

    <div>
      <h2>FREQUENTLY ASKED QUESTIONS</h2>
      <div class="container">
        <img src="assets/faq-v2.svg?nocache=9" alt="FAQ" />
      </div>
    </div>

    <div>
      <h2>CALL TO ACTION</h2>
      <div class="container">
        <img src="assets/cta-v2.svg?nocache=9" alt="Call to Action" />
      </div>
    </div>

    <div>
      <h2>DEVELOPER QUOTE</h2>
      <div class="container">
        <img src="assets/compiled-quote.svg?nocache=9" alt="Developer Quote" />
      </div>
    </div>

    <div>
      <h2>SOCIAL LINKS</h2>
      <div
        style="
          display: flex;
          gap: 10px;
          max-width: 1200px;
          padding: 20px;
          border: 1px solid #222;
        "
      >
        <img src="assets/link-framer-v2.svg?nocache=9" width="25%" />
        <img src="assets/link-linkedin-v2.svg?nocache=9" width="25%" />
        <img src="assets/link-telegram-v2.svg?nocache=9" width="25%" />
        <img src="assets/link-facebook-v2.svg?nocache=9" width="25%" />
      </div>
    </div>
  </body>
</html>
